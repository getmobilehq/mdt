name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api:
    name: mdt-api (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/mdt-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/mdt-api/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  workers:
    name: mdt-workers (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/mdt-workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/mdt-workers/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  web:
    name: mdt-web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mdt-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/mdt-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci.placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
